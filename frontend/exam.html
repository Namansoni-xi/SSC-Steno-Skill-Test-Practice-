<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SSC Steno Skill Test</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#e9edf5;
}

/* TOP BAR */
.topbar {
  background:#1a237e;
  color:white;
  padding:12px;
  display:flex;
  justify-content:space-between;
}

.timer {
  background:red;
  padding:5px 10px;
  border-radius:4px;
}

/* MAIN */
.container {
  padding:15px;
}

/* AUDIO */
.audio-box {
  background:white;
  padding:10px;
  border-radius:6px;
  margin-bottom:10px;
}

/* TEXT AREA */
textarea {
  width:100%;
  height:220px;
  font-size:16px;
  padding:10px;
  border-radius:5px;
}

/* BUTTON */
button {
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#1a237e;
  color:white;
  border:none;
  border-radius:5px;
  font-size:16px;
}

/* RESULT */
.result {
  background:white;
  margin-top:10px;
  padding:10px;
  border-radius:5px;
}
</style>

</head>

<body>

<div class="topbar">
<div>SSC Steno Skill Test</div>
<div class="timer" id="timer">10:00</div>
</div>

<div class="container">

<div class="audio-box">
<b>Audio Dictation</b><br><br>
<audio controls>
  <source src="test.mp3" type="audio/mpeg">
</audio>
</div>

<textarea id="text" placeholder="Type here..."></textarea>

<button onclick="submitTest()">Submit Test</button>

<div class="result" id="result"></div>

</div>

<script>

// TIMER
let time = 600;

setInterval(() => {
  let m = Math.floor(time/60);
  let s = time%60;
  document.getElementById("timer").innerText =
    m + ":" + (s<10?"0"+s:s);
  time--;
},1000);


// SUBMIT FUNCTION
async function submitTest(){

  let text = document.getElementById("text").value;

  try {

    let res = await fetch("http://192.168.136.206:8000/submit", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({user:text})
    });

    let data = await res.json();

    document.getElementById("result").innerHTML =
    "<h3>Result</h3>" +
    "Full Mistakes: " + data.full + "<br>" +
    "Half Mistakes: " + data.half + "<br>" +
    "Error %: " + data["error%"];

  } catch(e){
    alert("Error: Server connect nahi ho raha");
  }
}

</script>

</body>
</html>
