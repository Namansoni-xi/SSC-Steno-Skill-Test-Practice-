<!DOCTYPE html>
<html>
<head>
<title>SSC Steno</title>
</head>

<body>

<h2>SSC Steno Test</h2>

<input id="name" placeholder="Enter Name"><br><br>

<select id="test">
  <option value="1">Test 1</option>
  <option value="2">Test 2</option>
</select>

<br><br>

<textarea id="text" rows="10" cols="40"></textarea>

<br><br>

<button onclick="submitTest()">Submit</button>

<div id="result"></div>

<script>

async function submitTest(){

let res = await fetch("https://YOUR-BACKEND.onrender.com/submit", {
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name: document.getElementById("name").value,
user: document.getElementById("text").value,
test_id: parseInt(document.getElementById("test").value)
})
})

let data = await res.json()

document.getElementById("result").innerHTML =
"Full: "+data.full+"<br>"+
"Half: "+data.half+"<br>"+
"Error: "+data["error%"]

}

</script>

</body>
</html>
