<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SSC Steno Skill Test</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f0f2f5;
}

.header{
  background:#1a237e;
  color:white;
  padding:12px;
  display:flex;
  justify-content:space-between;
}

.container{
  display:flex;
}

.left{
  width:70%;
  padding:15px;
}

.right{
  width:30%;
  background:white;
  padding:15px;
  border-left:2px solid #ddd;
}

textarea{
  width:100%;
  height:300px;
  font-size:16px;
  padding:10px;
}

button{
  padding:10px 20px;
  background:#1a237e;
  color:white;
  border:none;
  cursor:pointer;
}

.timer{
  font-size:18px;
  font-weight:bold;
}

.result{
  background:#fff;
  padding:10px;
  margin-top:10px;
  border-radius:5px;
}
</style>

</head>

<body>

<div class="header">
  <div>SSC Steno Skill Test</div>
  <div class="timer">Time Left: <span id="timer">45:00</span></div>
</div>

<div class="container">

<div class="left">

<h3>Audio Dictation</h3>
<audio id="audio" controls></audio>

<h3>Type Here</h3>
<textarea id="text" placeholder="Start typing here..."></textarea>

<br><br>

<button onclick="submitTest()">Submit</button>

<div id="result" class="result"></div>

</div>

<div class="right">

<h3>Instructions</h3>

<ul>
<li>Listen carefully</li>
<li>Type without mistakes</li>
<li>Do not refresh page</li>
<li>Submit before time ends</li>
</ul>

<h3>User</h3>
<p id="user"></p>

</div>

</div>

<script>

const API = "https://ssc-steno-skill-test-practice.onrender.com";

// USER
document.getElementById("user").innerText =
localStorage.getItem("user");

// TIMER
let time = 600;

setInterval(()=>{
time--;
let m = Math.floor(time/60);
let s = time%60;

document.getElementById("timer").innerText =
m+":"+(s<10?"0"+s:s);

if(time<=0){
submitTest();
}
},1000);

// LOAD TEST
async function load(){
let res = await fetch(API+"/tests");
let data = await res.json();

window.test = data[0];

document.getElementById("audio").src = test.audio;
}

load();

// SUBMIT
async function submitTest(){

let res = await fetch(API+"/submit",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name: localStorage.getItem("user"),
user_text: document.getElementById("text").value,
test_id: test.id
})
});

let d = await res.json();

document.getElementById("result").innerHTML =
"<b>Error:</b> "+d["error%"]+"%<br><br>"+d.highlight;

}

</script>

</body>
</html>
