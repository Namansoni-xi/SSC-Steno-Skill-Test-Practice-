<!DOCTYPE html>
<html>
<head>
<title>SSC Test</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#f4f6f9;
}

.header{
  background:#1a237e;
  color:white;
  padding:12px;
  display:flex;
  justify-content:space-between;
}

.container{
  padding:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

textarea{
  width:100%;
  height:300px;
  font-size:16px;
  padding:10px;
  margin-top:10px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#1a237e;
  color:white;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="header">
<div>SSC Test</div>
<div id="timer"></div>
</div>

<div class="container">

<div class="card">

<!-- 🔴 AUDIO (OPTIONAL) -->
<audio id="audio" controls style="display:none"></audio>

<textarea id="text" disabled placeholder="Typing starts after dictation..."></textarea>

<button onclick="submitTest()">Submit</button>

<div id="result"></div>

</div>

</div>

<script>

const API="https://ssc-steno-skill-test-practice.onrender.com";

let phase="dictation";
let time=0;
let interval;

async function load(){

let id=localStorage.getItem("test_id");

let res=await fetch(API+"/tests");
let data=await res.json();

let test=data.find(t=>t.id==id);

window.test=test;

// 🎧 अगर audio है तभी दिखे
if(test.audio){
audio.style.display="block";
audio.src=test.audio;
}

time=test.dictation_time*60;

startTimer();
}

load();

function startTimer(){

interval=setInterval(()=>{

time--;

let m=Math.floor(time/60);
let s=time%60;

timer.innerText=m+":"+(s<10?"0"+s:s);

if(time<=0){

if(phase==="dictation"){
phase="typing";
text.disabled=false;
time=test.transcription_time*60;
alert("Start Typing");
}else{
clearInterval(interval);
submitTest();
}

}

},1000);
}

async function submitTest(){

let res=await fetch(API+"/submit",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name:localStorage.getItem("user"),
user_text:text.value,
test_id:test.id
})
});

let d=await res.json();

result.innerHTML=`<b>Error:</b> ${d["error%"]}%`;
}

</script>

</body>
</html>
