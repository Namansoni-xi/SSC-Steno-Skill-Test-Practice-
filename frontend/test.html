<script>

const API = "https://ssc-steno-skill-test-practice.onrender.com";

let phase = "dictation";
let time = 0;
let interval;
let switchCount = 0;

// USER
document.getElementById("user").innerText =
localStorage.getItem("user");

// 🔒 FULLSCREEN
document.documentElement.requestFullscreen();

// ❌ COPY PASTE DISABLE
document.addEventListener("copy", e => e.preventDefault());
document.addEventListener("paste", e => e.preventDefault());

// 🔴 TAB SWITCH DETECT (🔥 सही जगह)
document.addEventListener("visibilitychange", function(){

if(document.hidden){

switchCount++;

alert("Tab switch detected!");

if(switchCount >= 2){
alert("Exam terminated!");
submitTest();
}

}

});

// LOAD TEST
async function load(){
let res = await fetch(API+"/tests");
let data = await res.json();

window.test = data[0];

document.getElementById("audio").src = test.audio;

// dictation start
time = test.dictation_time * 60;

startTimer();
}

load();

// TIMER
function startTimer(){

interval = setInterval(()=>{

time--;

let m = Math.floor(time/60);
let s = time%60;

document.getElementById("timer").innerText =
m+":"+(s<10?"0"+s:s);

// PHASE SWITCH
if(time <= 0){

if(phase === "dictation"){

phase = "transcription";

document.getElementById("audio").pause();
document.getElementById("text").disabled = false;

time = test.transcription_time * 60;

alert("Start Typing Now");

}else{
clearInterval(interval);
submitTest();
}

}

},1000);
}

// 🎧 REWIND DISABLE
document.getElementById("audio").addEventListener("seeking", function(){
if(phase === "dictation"){
this.currentTime = 0;
}
});

// 🚀 SUBMIT
async function submitTest(){

clearInterval(interval);

let res = await fetch(API+"/submit",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name: localStorage.getItem("user"),
user_text: document.getElementById("text").value,
test_id: test.id
})
});

let d = await res.json();

// 🔥 NEW RESULT UI
let html = `
<b>Error:</b> ${d["error%"]}% <br>
<b>Accuracy:</b> ${d.accuracy}% <br>
<b>Total Words:</b> ${d.total_words} <br><br>
`;

// 🔴 WORD BREAKDOWN
d.breakdown.forEach(w=>{
if(w.status==="correct"){
html += `<span style="color:green">${w.word}</span> `;
}else{
html += `<span style="color:red">${w.word}</span> `;
}
});

// 🏆 RANK FETCH
let r = await fetch(API+"/rank/"+localStorage.getItem("user"));
let rank = await r.json();

html += `
<br><br>
<b>Rank:</b> ${rank.rank} / ${rank.total}<br>
<b>Percentile:</b> ${rank.percentile}%
`;

document.getElementById("result").innerHTML = html;

}

</script>
