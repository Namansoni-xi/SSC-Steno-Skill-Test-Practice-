<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

.header{
  padding:15px;
  font-size:20px;
  text-align:center;
  font-weight:bold;
}

.container{
  display:flex;
  gap:20px;
  padding:20px;
  flex-wrap:wrap;
}

.card{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  padding:20px;
  border-radius:15px;
  width:350px;
  box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

input,textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:8px;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#42a5f5;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#1e88e5;
}

.list{
  margin-top:20px;
}

.item{
  background:rgba(255,255,255,0.1);
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<div class="header">⚙️ Admin Panel - Create Test</div>

<div class="container">

<div class="card">

<input id="id" placeholder="Test ID">
<input id="title" placeholder="Title">
<textarea id="passage" placeholder="Dictation Passage"></textarea>

<input id="audio" placeholder="Audio URL (optional)">
<input id="dictation" placeholder="Dictation Time (min)">
<input id="transcription" placeholder="Typing Time (min)">

<button onclick="create()">Create Test</button>

</div>

<div class="card">
<h3>All Tests</h3>
<div id="list"></div>
</div>

</div>

<script>

const API="https://ssc-steno-skill-test-practice.onrender.com";

// CREATE
async function create(){

await fetch(API+"/create_test",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
id:parseInt(id.value),
title:title.value,
passage:passage.value,
audio:audio.value,
dictation_time:parseInt(dictation.value),
transcription_time:parseInt(transcription.value)
})
});

alert("Test Created");
load();
}

// LOAD
async function load(){
let res=await fetch(API+"/tests");
let data=await res.json();

let html="";

data.forEach(t=>{
html+=`
<div class="item">
<div>Test ${t.id}</div>
<button onclick="del(${t.id})">Delete</button>
</div>
`;
});

list.innerHTML=html;
}

load();

// DELETE
async function del(id){

await fetch(API+"/delete/"+id,{method:"DELETE"});

load();
}

</script>

</body>
</html>
