<!DOCTYPE html>
<html>
<body>

<script>
if(prompt("Enter Admin Password")!="12345"){
document.body.innerHTML="Access Denied";
}
</script>

<h2>ADMIN PANEL</h2>

<h3>Create Test</h3>
<input id="id" placeholder="ID"><br><br>
<input id="title" placeholder="Title"><br><br>
<textarea id="passage"></textarea><br><br>
<input id="audio" placeholder="Audio URL"><br><br>
  <br><br>
<input id="dictation" placeholder="Dictation Time (min)">
<br><br>
<input id="transcription" placeholder="Typing Time (min)">

<button onclick="create()">Create</button>

<hr>

<h3>All Tests</h3>
<div id="tests"></div>

<hr>

<h3>All Results</h3>
<div id="results"></div>

<script>

const API = "https://ssc-steno-skill-test-practice.onrender.com";

// CREATE
async function create(){
await fetch(API+"/create-test",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
id:parseInt(id.value),
title:title.value,
passage:passage.value,
audio:audio.value,
dictation_time:parseInt(dictation.value),
transcription_time:parseInt(transcription.value)
})
alert("Test Created");
loadTests();
}

// LOAD TESTS
async function loadTests(){
let res = await fetch(API+"/tests");
let data = await res.json();

let html="";

data.forEach(t=>{
html += `
<div>
<b>${t.id} - ${t.title}</b>
<button onclick="del(${t.id})">Delete</button>
</div>`;
});

document.getElementById("tests").innerHTML = html;
}

// DELETE
async function del(id){
await fetch(API+"/delete-test/"+id,{
method:"DELETE"
});
alert("Deleted");
loadTests();
}

// RESULTS
async function loadResults(){
let res = await fetch(API+"/all-results");
let data = await res.json();

let html="";

data.forEach(r=>{
html += `
<div>
${r.name} | Test ${r.test_id} | Error ${r.result["error%"]}%
</div>`;
});

document.getElementById("results").innerHTML = html;
}

loadTests();
loadResults();

</script>

</body>
</html>
