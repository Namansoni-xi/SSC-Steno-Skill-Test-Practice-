<!DOCTYPE html>
<html>
<head>
<title>Select Test</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

.header{
  padding:15px;
  font-size:20px;
  text-align:center;
  font-weight:bold;
}

.container{
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
}

.card{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  padding:20px;
  border-radius:15px;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

.card:hover{
  transform:translateY(-5px);
  background:rgba(255,255,255,0.2);
}

.title{
  font-size:18px;
  margin-bottom:5px;
}

.time{
  font-size:12px;
  opacity:0.8;
}
</style>
</head>

<body>

<div class="header">📘 Select Dictation Test</div>

<div class="container" id="tests"></div>

<script>

const API="https://ssc-steno-skill-test-practice.onrender.com";

async function load(){
let res=await fetch(API+"/tests");
let data=await res.json();

let html="";

data.forEach(t=>{
html+=`
<div class="card" onclick="start(${t.id})">
<div class="title">Test ${t.id}</div>
<div>${t.title}</div>
<div class="time">⏱ ${t.dictation_time} + ${t.transcription_time} min</div>
</div>
`;
});

tests.innerHTML=html;
}

load();

function start(id){
localStorage.setItem("test_id",id);
window.location.href="test.html";
}

</script>

</body>
</html>
